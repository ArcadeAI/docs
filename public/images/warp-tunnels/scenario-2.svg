<svg xmlns="http://www.w3.org/2000/svg" class="diagram-svg" viewBox="0 0 1300 800" role="img" aria-label="Scenario 2 diagram">

  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;}
    .z-label{font-size:12.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .z-label-sm{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
    .n-title{font-size:14.5px;font-weight:600;fill:#15131f}
    .n-sub{font-size:12px;fill:#6b7280}
    .n-mono{font-size:11.5px;fill:#7c768f;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .lbl{font-size:12.5px;font-weight:600;fill:#334155}
    .lbl-mono{font-size:11.5px;font-weight:600;fill:#475569;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .lbl-red{font-size:12px;font-weight:700;fill:#dc2626}
    .node-rect{filter:drop-shadow(0 1px 2px rgba(18,16,32,.10))}
  </style>
        <rect x="0" y="0" width="1300" height="800" rx="20" fill="#ffffff"/>
        <defs>
          <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
          </marker>
        </defs>

        <!-- AI clients -->
        <g>
          <rect class="node-rect" x="470" y="28" width="360" height="74" rx="12" fill="#fff" stroke="#cbd5e1"/>
          <text class="n-title" x="650" y="58" text-anchor="middle">AI Clients</text>
          <text class="n-sub" x="650" y="80" text-anchor="middle">Claude · Cursor · ChatGPT · Custom Agents</text>
        </g>

        <!-- Finance -->
        <rect x="40" y="150" width="380" height="410" rx="16" fill="#fffbeb" stroke="#fcd980"/>
        <text class="z-label" x="64" y="178" fill="#b45309">Finance · NYC datacenter</text>
        <g>
          <rect class="node-rect" x="70" y="210" width="320" height="66" rx="11" fill="#fff" stroke="#fcd980"/>
          <text class="n-title" x="230" y="240" text-anchor="middle">Arcade Engine :9099</text>
          <text class="n-mono" x="230" y="261" text-anchor="middle">ssrf_allowlist: 10.10.0.0/16</text>
        </g>
        <g>
          <rect class="node-rect" x="70" y="430" width="320" height="74" rx="11" fill="#fff" stroke="#ddd6fe"/>
          <text class="n-title" x="230" y="462" text-anchor="middle">Bloomberg · SAP · Workday MCP</text>
          <text class="n-mono" x="230" y="484" text-anchor="middle">10.10.x.x</text>
        </g>

        <!-- Engineering -->
        <rect x="460" y="150" width="380" height="410" rx="16" fill="#eff6ff" stroke="#bcd4fe"/>
        <text class="z-label" x="484" y="178" fill="#1d4ed8">Engineering · AWS us-east-1</text>
        <g>
          <rect class="node-rect" x="490" y="210" width="320" height="66" rx="11" fill="#fff" stroke="#bcd4fe"/>
          <text class="n-title" x="650" y="240" text-anchor="middle">Arcade Engine :9099</text>
          <text class="n-mono" x="650" y="261" text-anchor="middle">ssrf_allowlist: 10.20.0.0/16</text>
        </g>
        <g>
          <rect class="node-rect" x="490" y="430" width="320" height="74" rx="11" fill="#fff" stroke="#ddd6fe"/>
          <text class="n-title" x="650" y="462" text-anchor="middle">GitHub Enterprise · Jira MCP</text>
          <text class="n-mono" x="650" y="484" text-anchor="middle">10.20.x.x</text>
        </g>

        <!-- EU -->
        <rect x="880" y="150" width="380" height="410" rx="16" fill="#ecfdf5" stroke="#a7f3d0"/>
        <text class="z-label" x="904" y="178" fill="#047857">EU · AWS eu-west-1 · GDPR</text>
        <g>
          <rect class="node-rect" x="910" y="210" width="320" height="66" rx="11" fill="#fff" stroke="#a7f3d0"/>
          <text class="n-title" x="1070" y="240" text-anchor="middle">Arcade Engine :9099</text>
          <text class="n-mono" x="1070" y="261" text-anchor="middle">ssrf_allowlist: 10.30.0.0/16</text>
        </g>
        <g>
          <rect class="node-rect" x="910" y="430" width="320" height="74" rx="11" fill="#fff" stroke="#ddd6fe"/>
          <text class="n-title" x="1070" y="462" text-anchor="middle">EU Services MCP</text>
          <text class="n-mono" x="1070" y="484" text-anchor="middle">10.30.x.x</text>
        </g>

        <!-- Coordinator -->
        <g>
          <rect class="node-rect" x="460" y="640" width="380" height="78" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.4"/>
          <text class="n-title" x="650" y="672" text-anchor="middle" fill="#0f766e">Coordinator · shared control plane</text>
          <text class="n-sub" x="650" y="694" text-anchor="middle">Identity · RBAC · OAuth · API keys</text>
        </g>

        <!-- AI -> arcades -->
        <path d="M560 102 C 420 130, 280 160, 230 208" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a2)"/>
        <path d="M650 102 L650 208" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a2)"/>
        <path d="M740 102 C 880 130, 1020 160, 1070 208" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a2)"/>
        <g><rect x="320" y="150" width="112" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl" x="376" y="165" text-anchor="middle">HTTPS + OAuth</text></g>

        <!-- arcade -> tools -->
        <path d="M230 276 L230 428" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a2)"/>
        <path d="M650 276 L650 428" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a2)"/>
        <path d="M1070 276 L1070 428" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a2)"/>
        <g><rect x="141" y="341" width="178" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl" x="230" y="356" text-anchor="middle">HTTP · private network</text></g>
        <g><rect x="561" y="341" width="178" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl" x="650" y="356" text-anchor="middle">HTTP · private network</text></g>
        <g><rect x="981" y="341" width="178" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl" x="1070" y="356" text-anchor="middle">HTTP · private network</text></g>

        <!-- zones -> coordinator -->
        <path d="M230 560 C 230 610, 430 626, 500 648" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a2)"/>
        <path d="M650 560 L650 638" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a2)"/>
        <path d="M1070 560 C 1070 610, 870 626, 800 648" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a2)"/>
        <g><rect x="300" y="596" width="156" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl" x="378" y="611" text-anchor="middle">outbound HTTPS only</text></g>
        <g><rect x="572" y="586" width="156" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl" x="650" y="601" text-anchor="middle">outbound HTTPS only</text></g>
        <g><rect x="844" y="596" width="156" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl" x="922" y="611" text-anchor="middle">outbound HTTPS only</text></g>

        <!-- blocked barriers -->
        <path d="M392 467 L458 467" fill="none" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="5 4"/>
        <path d="M812 467 L878 467" fill="none" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="5 4"/>
        <g stroke="#dc2626" stroke-width="2"><line x1="419" y1="460" x2="431" y2="474"/><line x1="431" y1="460" x2="419" y2="474"/></g>
        <g stroke="#dc2626" stroke-width="2"><line x1="839" y1="460" x2="851" y2="474"/><line x1="851" y1="460" x2="839" y2="474"/></g>
        <g>
          <rect x="338" y="510" width="174" height="40" rx="8" fill="#fef2f2" stroke="#fecaca"/>
          <text class="lbl-red" x="425" y="526" text-anchor="middle">BLOCKED</text>
          <text x="425" y="542" text-anchor="middle" font-size="10.5" fill="#b91c1c">cross-network · not in allowlist</text>
        </g>
        <g>
          <rect x="758" y="510" width="174" height="40" rx="8" fill="#fef2f2" stroke="#fecaca"/>
          <text class="lbl-red" x="845" y="526" text-anchor="middle">BLOCKED</text>
          <text x="845" y="542" text-anchor="middle" font-size="10.5" fill="#b91c1c">cross-network · not in allowlist</text>
        </g>
      </svg>
