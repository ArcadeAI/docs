<svg xmlns="http://www.w3.org/2000/svg" class="diagram-svg" viewBox="0 0 1200 940" role="img" aria-label="Scenario 3 diagram">

  <style>
    text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;}
    .z-label{font-size:12.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .z-label-sm{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
    .n-title{font-size:14.5px;font-weight:600;fill:#15131f}
    .n-sub{font-size:12px;fill:#6b7280}
    .n-mono{font-size:11.5px;fill:#7c768f;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .lbl{font-size:12.5px;font-weight:600;fill:#334155}
    .lbl-mono{font-size:11.5px;font-weight:600;fill:#475569;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .lbl-red{font-size:12px;font-weight:700;fill:#dc2626}
    .node-rect{filter:drop-shadow(0 1px 2px rgba(18,16,32,.10))}
  </style>
        <rect x="0" y="0" width="1200" height="940" rx="20" fill="#ffffff"/>
        <defs>
          <marker id="a3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
          </marker>
          <marker id="a3d" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#9aa3b2"/>
          </marker>
        </defs>

        <!-- External context label -->
        <text class="z-label-sm" x="300" y="22" fill="#94a3b8">External · public internet</text>

        <!-- AI clients (external) -->
        <g>
          <rect class="node-rect" x="300" y="34" width="360" height="74" rx="12" fill="#fff" stroke="#cbd5e1"/>
          <text class="n-title" x="480" y="64" text-anchor="middle">AI Clients</text>
          <text class="n-sub" x="480" y="86" text-anchor="middle">Claude · Cursor · ChatGPT · Custom Agents</text>
        </g>

        <!-- Anthropic connector note -->
        <g>
          <rect x="724" y="32" width="386" height="78" rx="12" fill="#fffbeb" stroke="#fcd980"/>
          <text x="917" y="58" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b45309">Anthropic connector</text>
          <text x="917" y="79" text-anchor="middle" class="n-sub">Use arcade_oauth or user_source —</text>
          <text x="917" y="97" text-anchor="middle" class="n-sub">arcade_header unsupported (no custom headers)</text>
        </g>
        <path d="M660 71 L720 71" fill="none" stroke="#9aa3b2" stroke-width="1.5" stroke-dasharray="2 4" marker-end="url(#a3d)"/>

        <!-- Private network (single) -->
        <rect x="70" y="160" width="1060" height="600" rx="18" fill="#eef1ff" stroke="#c7d2fe"/>
        <text class="z-label" x="96" y="188" fill="#4f46e5">Private Network</text>

        <!-- Reverse proxy (INSIDE network) -->
        <g>
          <rect class="node-rect" x="430" y="208" width="340" height="118" rx="12" fill="#fff" stroke="#c7d2fe"/>
          <text class="n-title" x="600" y="240" text-anchor="middle">Reverse Proxy</text>
          <text class="n-sub" x="600" y="261" text-anchor="middle">cloudflared · ngrok · nginx</text>
          <line x1="470" y1="276" x2="730" y2="276" stroke="#e9e8ef"/>
          <text x="600" y="298" text-anchor="middle" font-size="11.5" fill="#4f46e5" font-weight="600">one outbound connection</text>
          <text x="600" y="314" text-anchor="middle" font-size="11" fill="#6b7280">no inbound ports opened</text>
        </g>

        <!-- Arcade Engine sub-zone -->
        <rect x="108" y="372" width="984" height="196" rx="13" fill="#fcfcff" stroke="#c7d2fe" stroke-dasharray="6 5"/>
        <text class="z-label-sm" x="130" y="395" fill="#4f46e5">Arcade Engine · :9099</text>
        <g>
          <rect class="node-rect" x="242" y="420" width="236" height="76" rx="11" fill="#fff" stroke="#c7d2fe"/>
          <text class="n-title" x="360" y="450" text-anchor="middle">/mcp/finance</text>
          <text class="n-sub" x="360" y="470" text-anchor="middle">tools: Bloomberg · SAP</text>
        </g>
        <g>
          <rect class="node-rect" x="722" y="420" width="236" height="76" rx="11" fill="#fff" stroke="#c7d2fe"/>
          <text class="n-title" x="840" y="450" text-anchor="middle">/mcp/engineering</text>
          <text class="n-sub" x="840" y="470" text-anchor="middle">tools: GitHub Enterprise</text>
        </g>

        <!-- MCP servers (inside) -->
        <text class="z-label-sm" x="130" y="612" fill="#7c3aed">Internal MCP Servers</text>
        <g>
          <rect class="node-rect" x="150" y="626" width="240" height="84" rx="11" fill="#fff" stroke="#ddd6fe"/>
          <text class="n-title" x="270" y="662" text-anchor="middle">Bloomberg MCP</text>
          <text class="n-mono" x="270" y="683" text-anchor="middle">bloomberg.corp.internal</text>
        </g>
        <g>
          <rect class="node-rect" x="480" y="626" width="200" height="84" rx="11" fill="#fff" stroke="#ddd6fe"/>
          <text class="n-title" x="580" y="662" text-anchor="middle">SAP MCP</text>
          <text class="n-mono" x="580" y="683" text-anchor="middle">sap.corp.internal</text>
        </g>
        <g>
          <rect class="node-rect" x="770" y="626" width="280" height="84" rx="11" fill="#fff" stroke="#ddd6fe"/>
          <text class="n-title" x="910" y="662" text-anchor="middle">GitHub Enterprise MCP</text>
          <text class="n-mono" x="910" y="683" text-anchor="middle">github.corp.internal</text>
        </g>

        <!-- Coordinator (outside) -->
        <g>
          <rect class="node-rect" x="410" y="822" width="380" height="78" rx="12" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.4"/>
          <text class="n-title" x="600" y="854" text-anchor="middle" fill="#0f766e">Coordinator · shared control plane</text>
          <text class="n-sub" x="600" y="876" text-anchor="middle">Identity · RBAC · OAuth · API keys</text>
        </g>

        <!-- ===== connectors ===== -->
        <!-- clients -> proxy (crosses boundary) -->
        <path d="M480 108 C 480 152, 560 176, 590 206" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a3)"/>
        <g><rect x="430" y="134" width="172" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl" x="516" y="149" text-anchor="middle">HTTPS · public endpoint</text></g>

        <!-- proxy -> engine -->
        <path d="M600 326 L600 370" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a3)"/>
        <g><rect x="626" y="337" width="120" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl" x="686" y="352" text-anchor="middle">HTTP · internal</text></g>

        <!-- gateways -> servers (ssrf) -->
        <path d="M360 496 C 360 560, 285 575, 272 624" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a3)"/>
        <path d="M360 496 C 420 560, 545 575, 575 624" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a3)"/>
        <path d="M840 496 C 870 560, 895 575, 908 624" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a3)"/>
        <g><rect x="205" y="556" width="106" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl-mono" x="258" y="571" text-anchor="middle">ssrf_allowlist</text></g>
        <g><rect x="468" y="556" width="106" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl-mono" x="521" y="571" text-anchor="middle">ssrf_allowlist</text></g>
        <g><rect x="828" y="556" width="106" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl-mono" x="881" y="571" text-anchor="middle">ssrf_allowlist</text></g>

        <!-- private network -> coordinator -->
        <path d="M600 760 L600 820" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#a3)"/>
        <g><rect x="626" y="779" width="156" height="22" rx="6" fill="#fff" stroke="#e9e8ef"/><text class="lbl" x="704" y="794" text-anchor="middle">outbound HTTPS only</text></g>
      </svg>
