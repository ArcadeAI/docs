<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 400" role="img" aria-label="Multiple Arcade runtimes, one per network or region, each with its own ssrf_allowlist and credentials. One managed surface fronts them all, and they share one identity and access layer in Arcade. Regional data never leaves its region.">
  <style>
    text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    .t{font-size:13px;font-weight:680;fill:#16151a}.s{font-size:10.5px;fill:#6f6e79}
    .m{font-size:10px;fill:#827f8c;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .z{font-size:9.5px;font-weight:700;letter-spacing:.7px;fill:#9a98a4;font-family:ui-monospace,Menlo,monospace}
    .lw{font-size:10px;fill:#4b33dd;font-family:ui-monospace,Menlo,monospace}
    .node{filter:drop-shadow(0 2px 4px rgba(18,16,32,.10))}
  </style>
  <rect x="0" y="0" width="1080" height="400" rx="16" fill="#ffffff"/>
  <g class="node"><rect x="360" y="20" width="360" height="50" rx="12" fill="#fff" stroke="#cfcdc6"/></g>
  <text class="t" x="540" y="42" text-anchor="middle">Every AI client · one managed surface</text>
  <text class="s" x="540" y="60" text-anchor="middle">clients never learn where anything runs</text>

  <!-- pipes to runtimes -->
  <line x1="360" y1="92" x2="200" y2="150" stroke="#4b33dd" stroke-width="11" stroke-linecap="round"/><line x1="356" y1="94" x2="206" y2="148" stroke="#C9F84F" stroke-width="2.4" stroke-dasharray="2 12"/>
  <line x1="540" y1="72" x2="540" y2="150" stroke="#4b33dd" stroke-width="11" stroke-linecap="round"/><line x1="540" y1="76" x2="540" y2="148" stroke="#C9F84F" stroke-width="2.4" stroke-dasharray="2 12"/>
  <line x1="720" y1="92" x2="880" y2="150" stroke="#4b33dd" stroke-width="11" stroke-linecap="round"/><line x1="724" y1="94" x2="874" y2="148" stroke="#C9F84F" stroke-width="2.4" stroke-dasharray="2 12"/>
  <text class="lw" x="540" y="120" text-anchor="middle">a managed Warp Pipes connection per runtime</text>

  <text class="z" x="60" y="150">AMERICAS · DATACENTER</text>
  <text class="z" x="455" y="150">AWS · US-EAST</text>
  <text class="z" x="800" y="150">EU · DATA RESIDENCY</text>
  <g class="node"><rect x="60" y="158" width="260" height="60" rx="12" fill="#fff" stroke="#cfc7fb" stroke-width="1.4"/></g>
  <text x="190" y="184" text-anchor="middle" fill="#4b33dd" font-size="12" font-weight="700">Arcade runtime</text><text class="s" x="190" y="203" text-anchor="middle">markets &amp; finance tools</text>
  <g class="node"><rect x="410" y="158" width="260" height="60" rx="12" fill="#fff" stroke="#cfc7fb" stroke-width="1.4"/></g>
  <text x="540" y="184" text-anchor="middle" fill="#4b33dd" font-size="12" font-weight="700">Arcade runtime</text><text class="s" x="540" y="203" text-anchor="middle">engineering tools</text>
  <g class="node"><rect x="760" y="158" width="260" height="60" rx="12" fill="#fff" stroke="#cfc7fb" stroke-width="1.4"/></g>
  <text x="890" y="184" text-anchor="middle" fill="#4b33dd" font-size="12" font-weight="700">Arcade runtime</text><text class="s" x="890" y="203" text-anchor="middle">EU services · GDPR data</text>

  <line x1="190" y1="218" x2="190" y2="254" stroke="#4b33dd" stroke-width="8" stroke-linecap="round"/>
  <line x1="540" y1="218" x2="540" y2="254" stroke="#4b33dd" stroke-width="8" stroke-linecap="round"/>
  <line x1="890" y1="218" x2="890" y2="254" stroke="#4b33dd" stroke-width="8" stroke-linecap="round"/>
  <g class="node"><rect x="60" y="256" width="260" height="40" rx="10" fill="#f4f1ff" stroke="#ddd6fe"/></g><text class="s" x="190" y="281" text-anchor="middle">Bloomberg · SAP · Workday</text>
  <g class="node"><rect x="410" y="256" width="260" height="40" rx="10" fill="#f4f1ff" stroke="#ddd6fe"/></g><text class="s" x="540" y="281" text-anchor="middle">GitHub Enterprise · Jira</text>
  <g class="node"><rect x="760" y="256" width="260" height="40" rx="10" fill="#f4f1ff" stroke="#ddd6fe"/></g><text class="s" x="890" y="281" text-anchor="middle">EU services · regulated data</text>

  <g class="node"><rect x="220" y="332" width="640" height="44" rx="11" fill="#eafaf0" stroke="#b4e6c6"/></g>
  <text x="540" y="359" text-anchor="middle" fill="#1a9e4b" font-size="11.5" font-weight="700">one identity &amp; access layer in Arcade — shared identity · independent, isolated data planes</text>
</svg>
