name: Generate toolkit docs
# Description: Generate toolkit JSON from Engine API, then sync sidebar navigation.
# Flow:
# 1) Build the toolkit docs generator
# 2) Generate toolkit JSON into toolkit-docs-generator/data/toolkits
# 3) Sync integrations sidebar _meta.tsx from toolkit-docs-generator/data/toolkits
# 4) Open a PR if changes were produced

on:
  repository_dispatch:
    types: [porter_deploy_succeeded]
  workflow_dispatch:
    inputs:
      providers:
        description: >-
          Comma-separated list of provider IDs (e.g. "Github,Slack"). When set,
          the workflow runs only these providers and bypasses --skip-unchanged,
          forcing the full merge (including the secret-coherence scan and LLM
          edits) to re-evaluate even when the Engine API reports no version
          change. Leave empty to run the full scheduled flow.
        required: false
        default: ""
  # 11:00 UTC = 3 AM PST / 4 AM PDT — late enough that DST drift doesn't matter.
  schedule:
    - cron: "0 11 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # Opt in to Node 24 for JavaScript actions before GitHub forces the
    # switch on 2026-06-02. Harmless today; unblocks the cutover.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build toolkit docs generator
        run: pnpm build
        working-directory: toolkit-docs-generator

      - name: Generate toolkit docs
        run: |
          # Manual focused runs: workflow_dispatch with `providers` input
          # bypasses --skip-unchanged and --all, so the secret-coherence
          # scan actually re-evaluates the chosen toolkits even when the
          # Engine API reports no version change. Scheduled and porter
          # runs keep the default --all --skip-unchanged behavior.
          PROVIDERS_INPUT="${{ inputs.providers }}"
          if [ -n "$PROVIDERS_INPUT" ]; then
            SCOPE_ARGS=(--providers "$PROVIDERS_INPUT")
            echo "Focused run for: $PROVIDERS_INPUT (--skip-unchanged disabled)"
          else
            SCOPE_ARGS=(--all --skip-unchanged)
          fi

          pnpm dlx tsx src/cli/index.ts generate \
            "${SCOPE_ARGS[@]}" \
            --require-complete \
            --verbose \
            --api-source tool-metadata \
            --tool-metadata-url "$ENGINE_API_URL" \
            --tool-metadata-key "$ENGINE_API_KEY" \
            --llm-provider openai \
            --llm-model "$OPENAI_MODEL" \
            --llm-api-key "$OPENAI_API_KEY" \
            --llm-editor-provider anthropic \
            --llm-editor-model "$ANTHROPIC_EDITOR_MODEL" \
            --llm-editor-api-key "$ANTHROPIC_API_KEY" \
            --toolkit-concurrency 8 \
            --llm-concurrency 15 \
            --exclude-file ./excluded-toolkits.txt \
            --ignore-file ./ignored-toolkits.txt \
            --output data/toolkits
        working-directory: toolkit-docs-generator
        env:
          ENGINE_API_URL: ${{ secrets.ENGINE_API_URL }}
          ENGINE_API_KEY: ${{ secrets.ENGINE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          # Stronger model for the secret-coherence editor. Keeps
          # stale-secret cleanup precise instead of re-summarizing the whole
          # artifact (which gpt-4o-mini tends to do).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_EDITOR_MODEL: ${{ secrets.ANTHROPIC_EDITOR_MODEL || 'claude-sonnet-4-6' }}

      - name: Sync toolkit sidebar navigation
        run: pnpm dlx tsx toolkit-docs-generator/scripts/sync-toolkit-sidebar.ts --remove-empty-sections=false --verbose

      - name: Check for changes
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        if: steps.check-changes.outputs.has_changes == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        env:
          HUSKY: 0
        with:
          token: ${{ secrets.DOCS_PUBLISHABLE_GH_TOKEN }}
          commit-message: "[AUTO] Adding MCP Servers docs update"
          title: "[AUTO] Adding MCP Servers docs update"
          body: |
            This PR was generated after a Porter deploy succeeded.

            - Trigger: ${{ github.event_name }}
            - Deploy env: ${{ github.event.client_payload.env || 'unknown' }}
            - Deploy SHA: ${{ github.event.client_payload.deploy_sha || 'unknown' }}
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          branch: automation/toolkit-docs-${{ github.run_id }}
          delete-branch: true

      - name: Request team review
        if: steps.check-changes.outputs.has_changes == 'true' && steps.cpr.outputs.pull-request-number != ''
        continue-on-error: true
        run: gh pr edit ${{ steps.cpr.outputs.pull-request-number }} --add-reviewer ArcadeAI/engineering-tools-and-dx
        env:
          GH_TOKEN: ${{ secrets.DOCS_PUBLISHABLE_GH_TOKEN }}
